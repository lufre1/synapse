# mamba env create --file=env_cpu.yaml
name: synapse
channels:
    - conda-forge
dependencies:
    - python=3.11
    - bioimageio.core
    - imagecodecs
    - kornia
    - magicgui
    - napari >=0.5.0,<0.6.0
    - pip
    - python-elf >=0.9.0
    - "pytorch=*=cpu*"
    - tensorboard
    - torch_em >=0.9.0
    - torchvision
    - tqdm
    - trimesh
    - zarr <3
    - pip:
        - bioimage-cpp
        - napari-skimage-regionprops
