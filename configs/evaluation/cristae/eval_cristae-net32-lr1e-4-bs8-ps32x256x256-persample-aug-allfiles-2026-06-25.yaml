# Eval for the ALL-FILES persample-aug run (cristae-...-persample-aug-allfiles-2026-06-25, job 14495500).
# Same recipe as eval_..._persample-aug-legacy-2026-06-18.yaml; only model_path/export_path differ.
# Identical pinned 15-file test split -> AP directly comparable to 0.830 (persample-aug) / 0.837 (06-01).
# (Trained with standardize, so NO normalize flag here.)
#
# Reproducible launch — chained to fire after training SUCCEEDS:
#   python sbatch_runner.py configs/evaluation/cristae/eval_cristae-net32-lr1e-4-bs8-ps32x256x256-persample-aug-allfiles-2026-06-25.yaml --dependency afterok:14495500
# (replace 14495500 with the training job id when reproducing)

slurm_profile: grete_interactive

env:
  type: micromamba
  path: /mnt/vast-nhr/home/freckmann15/u12103/micromamba/envs/synapse

commands:
  - python ${REPO}/inference/cristae/segment_cristae.py -c ${SELF}
  - python ${REPO}/evaluation/cristae/evaluate_cristae.py -c ${SELF}
  - python ${REPO}/evaluation/cristae/evaluate_cristae_ap.py -c ${SELF}

model_path: /mnt/lustre-grete/usr/u12103/cristae/checkpoints/cristae-net32-lr1e-4-bs8-ps32x256x256-persample-aug-allfiles-2026-06-25
export_path: &export_path /mnt/lustre-grete/usr/u12103/cristae/test_segmentations/cristae-net32-lr1e-4-bs8-ps32x256x256-persample-aug-allfiles-2026-06-25
tile_shape: [32, 256, 256]
save_predictions: true   # save pred/foreground so evaluate_cristae_ap.py can reuse it

h5_paths:  # pinned test split (SYNAPSENETV1_TEST_SPLIT, 15 files; Otof_455L repointed to needs_corrections)
  - /mnt/lustre-grete/usr/u12103/cristae_data/wichmann/inital_data/WT22_eb5_model2_combined.h5
  - /mnt/lustre-grete/usr/u12103/cristae_data/wichmann/inital_data/WT40_eb10_model_combined.h5
  - /mnt/lustre-grete/usr/u12103/cristae_data/wichmann/inital_data/M5_eb1_model_combined.h5
  - /mnt/lustre-grete/usr/u12103/mitochondria/cooper/cristae/2026/36859_J1_66K_TS_PS_03_rec_2kb1dawbp_crop_combined.h5
  - /mnt/lustre-grete/usr/u12103/mitochondria/cooper/cristae/2026/36194_B4_66K_TS_SC_22_rec_crop_combined.h5
  - /mnt/lustre-grete/usr/u12103/cristae_data/wichmann/inital_data/WT21_eb5_model2_combined.h5
  - /mnt/lustre-grete/usr/u12103/cristae_data/wichmann/inital_data/KO8_eb4_model_combined.h5
  - /mnt/lustre-grete/usr/u12103/cristae_data/wichmann_needs_corrections/2026-05-26-dataset/Otof_AVCN07_455L_KO_M.Stim_B3_2_35933_combined.h5
  - /mnt/lustre-grete/usr/u12103/cristae_data/wichmann/inital_data/M8_eb6_model_combined.h5
  - /mnt/lustre-grete/usr/u12103/cristae_data/wichmann/inital_data/WT20_eb5_model2_combined.h5
  - /mnt/lustre-grete/usr/u12103/cristae_data/wichmann/inital_data/M1_eb6_model_combined.h5
  - /mnt/lustre-grete/usr/u12103/cristae_data/wichmann/inital_data/M2_eb5_model_combined.h5
  - /mnt/lustre-grete/usr/u12103/cristae_data/wichmann/inital_data/Otof_AVCN03_429A_WT_M.Stim_D3_4model_combined.h5
