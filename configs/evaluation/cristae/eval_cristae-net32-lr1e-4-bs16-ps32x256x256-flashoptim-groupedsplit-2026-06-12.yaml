#    retrains/re-evaluates from scratch (the checkpoint no longer exists).
# Eval for the flashoptim (bf16/FlashAdamW) grouped-split model: segment test split, then evaluate.
# Run AFTER the other evals (single GPU):
#   python sbatch_runner.py configs/evaluation/cristae/eval_cristae-net32-lr1e-4-bs16-ps32x256x256-flashoptim-groupedsplit-2026-06-12.yaml
#
# NOTE: the raw flashoptim checkpoint stores an EMPTY init + bf16 weights, so the standard loader
# cannot reconstruct the model. model_path therefore points at a REPAIRED copy (valid init copied
# from a same-arch checkpoint + bf16->fp32 cast). best.pt = epoch 4 (val-best); latest = epoch 20.
# Trained with standardize (no --normalize), so NO normalize flag here.

