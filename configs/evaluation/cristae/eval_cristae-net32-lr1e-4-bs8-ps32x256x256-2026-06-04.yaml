# Cristae evaluation 2026-06-04: segment test split, then evaluate.
# Replaces: eval/cristae/run_eval_cristae-2026-06-06.sh (which was 06-04 config)

slurm_profile: grete_shared_80gb

env:
  type: micromamba
  path: /mnt/vast-nhr/home/freckmann15/u12103/micromamba/envs/synapse

# Two-step pipeline: segment, then evaluate
