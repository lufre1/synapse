# Eval for the loss-isolation A/B — LEGACY arm: segment the test split, then evaluate.
# Run: python sbatch_runner.py configs/evaluation/cristae/eval_cristae_lossAB_legacy.yaml
#
# ⚠️  INERT: pairs with the inert loss A/B (legacy/new reductions are numerically
# identical). The lossAB checkpoints won't exist unless that (pointless) training is run.

slurm_profile: grete_shared_80gb

env:
  type: micromamba
  path: /mnt/vast-nhr/home/freckmann15/u12103/micromamba/envs/synapse

# Two-step pipeline: segment, then evaluate (both read the algorithm config below via -c ${SELF}).
commands:
  - python ${REPO}/inference/cristae/segment_cristae.py -c ${SELF}
  - python ${REPO}/evaluation/cristae/evaluate_cristae.py -c ${SELF}

# ---- Algorithm config (consumed by both scripts via -c) ----
model_path: /mnt/lustre-grete/usr/u12103/cristae/checkpoints/cristae-lossAB-legacy-2026-06-09
