# Eval for the 06-01 faithful reproduction (old per-sample valid-mask loss + default augmentation):
# segment the test split, then evaluate. Run AFTER training:
#   python sbatch_runner.py configs/evaluation/cristae/eval_cristae-net32-lr1e-4-bs8-ps32x256x256-repro0601-oldloss-legacy-2026-06-16.yaml
# (trained with standardize, so NO normalize flag here.)

slurm_profile: grete_interactive

env:
  type: micromamba
  path: /mnt/vast-nhr/home/freckmann15/u12103/micromamba/envs/synapse

commands:
  - python ${REPO}/inference/cristae/segment_cristae.py -c ${SELF}
  - python ${REPO}/evaluation/cristae/evaluate_cristae.py -c ${SELF}
  - python ${REPO}/evaluation/cristae/evaluate_cristae_ap.py -c ${SELF}

model_path: /mnt/lustre-grete/usr/u12103/cristae/checkpoints/cristae-net32-lr1e-4-bs8-ps32x256x256-repro0601-oldloss-legacy-2026-06-16
