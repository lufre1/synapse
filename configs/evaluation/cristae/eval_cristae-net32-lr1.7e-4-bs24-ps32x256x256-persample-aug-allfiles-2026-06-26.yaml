# Eval for the bs24 STANDARD (mixed-precision) persample-aug allfiles run (job 14507154).
# Same recipe/test split as eval_..._persample-aug-allfiles-2026-06-25.yaml; only model_path/export_path
# differ. Pinned 15-file split -> AP directly comparable to 0.830 (bs8 allfiles) / 0.837 (06-01 gold).
# Trained with standardize (no --normalize). Checkpoint has valid init + fp32 weights -> loads directly.
#
# Submit chained to fire after training SUCCEEDS:
#   python sbatch_runner.py configs/evaluation/cristae/eval_cristae-net32-lr1.7e-4-bs24-ps32x256x256-persample-aug-allfiles-2026-06-26.yaml --dependency afterok:14507154

slurm_profile: grete_interactive

env:
  type: micromamba
  path: /mnt/vast-nhr/home/freckmann15/u12103/micromamba/envs/synapse

commands:
  - python ${REPO}/inference/cristae/segment_cristae.py -c ${SELF}
  - python ${REPO}/evaluation/cristae/evaluate_cristae.py -c ${SELF}
  - python ${REPO}/evaluation/cristae/evaluate_cristae_ap.py -c ${SELF}

model_path: /mnt/lustre-grete/usr/u12103/cristae/checkpoints/cristae-net32-lr1.7e-4-bs24-ps32x256x256-persample-aug-allfiles-2026-06-26
