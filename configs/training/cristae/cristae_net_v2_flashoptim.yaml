  patch_shape: [32, 256, 256]
  n_iterations: 100000
  batch_size: 8
  learning_rate: 1.0e-4
  feature_size: 32
  ignore_state_value: 2
  state_channel: 1
  test_split: "synapsenetv1-testsplit"
  early_stopping: 15
  seed: 42
  use_flashoptim: true
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
