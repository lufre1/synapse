# Cristae training — PER-SAMPLE masked Dice + augmentation, the 2026-06-01 recipe with NO torch_em fork.
# Run: python sbatch_runner.py configs/training/cristae/cristae_persample_aug.yaml
#
# loss_variant=persample -> synapse.util.MaskedDiceLossPerSample (per-sample / mean-of-ratios Dice, mask
# carried in the target). Numerically identical to the old per-sample valid-mask torch_em DiceLoss, but
# needs NO torch_em change and NO trainer hook — runs on upstream torch_em `main`.
# --augmentations -> AugmentedMitoStateMaskTransform restores the default Kornia augmentation (06-01 had it).
# This is the clean replacement for cristae_repro0601_oldloss.yaml (which required the
# torch-em `cristae-oldloss-repro` branch). To run on stock torch_em: `cd .../torch-em && git checkout main`.

slurm_profile: grete_shared

env:
  type: micromamba
  path: /mnt/vast-nhr/home/freckmann15/u12103/micromamba/envs/synapse

script: "training/cristae/train_cristae.py"
args:
  experiment_name: "cristae-net32-lr1e-4-bs8-ps32x256x256-persample-aug-legacy-2026-06-18"
  loss_variant: "persample"         # MaskedDiceLossPerSample (torch_em-free per-sample reduction)
  augmentations: true               # default Kornia augmentation via AugmentedMitoStateMaskTransform
  split_strategy: "legacy"
  data_dir: "/scratch-grete/projects/nim00007/data/mitochondria/cooper/raw_mito_combined_s2"
  data_dir2: "/mnt/lustre-grete/usr/u12103/mitochondria/cooper/cristae"
  data_dir3: "/mnt/lustre-grete/usr/u12103/cristae_data/wichmann/"
  patch_shape: [32, 256, 256]
  n_iterations: 75000
  batch_size: 8
  learning_rate: 1.0e-4
  feature_size: 32
  ignore_state_value: 2
  state_channel: 1
  test_split: "synapsenetv1-testsplit"
  early_stopping: 25
  seed: 42
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
