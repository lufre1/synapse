# One-shot GPU memory probe: largest batch size that fits the cristae 3D UNet on an 80 GB A100.
# Runs training/cristae/probe_max_batch.py, which sweeps batch sizes in a SINGLE process (no
# submit->queue->OOM->repeat loop) for both precision regimes:
#   fp32 -> flashoptim's "single precision" footprint;  amp -> standard mixed_precision trainer.
# Pinned to grete_shared_80gb so it measures on the SAME card the real training will use.
# Run: python sbatch_runner.py configs/training/cristae/cristae_probe_maxbatch.yaml
# Dry-run: python sbatch_runner.py configs/training/cristae/cristae_probe_maxbatch.yaml --dry-run
# Finishes in ~1-2 min; read the FIT/OOM table in logs/sbatch_jobs/cristae_probe_maxbatch_*.log

slurm_profile: grete_shared_80gb

env:
  type: micromamba
  path: /mnt/vast-nhr/home/freckmann15/u12103/micromamba/envs/synapse

script: "training/cristae/probe_max_batch.py"
args:
  batch_sizes: "8,12,16,20,24,28,32,40,48"
  patch_shape: [32, 256, 256]
  feature_size: 32
  regimes: "fp32,amp"
  iters: 3
