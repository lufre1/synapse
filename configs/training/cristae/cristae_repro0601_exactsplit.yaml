# Cristae training — DEFINITIVE 06-01 reproduction on the refactored code, EXACT split + EXACT data.
# Run: python sbatch_runner.py configs/training/cristae/cristae_repro0601_exactsplit.yaml
#
# Reproduces cristae-2026-06-01 as faithfully as the current code allows:
#   - split_file: 06-01's EXACT 120 train / 15 val / 15 test files (extracted from its checkpoint;
#     12 moved files remapped to wichmann_needs_corrections — content verified unchanged since 06-01).
#   - loss_variant=persample: per-sample (mean-of-ratios) masked Dice = 06-01's loss reduction, but
#     torch_em-free (MaskedDiceLossPerSample, mask in target) → runs on refactored code, NO torch_em fork.
#   - augmentations=true: default Kornia augmentation (06-01 trained WITH it) via AugmentedMitoStateMaskTransform.
#   - standardize raw transform, bs8, lr1e-4, feat32, ps32x256x256, ~75k iters (06-01 ran 74676).
# Decision: AP ~0.837 -> refactored code fully reproduces 06-01 (earlier gap = split + pooled-loss +
# lost-augmentation); AP <0.837 with exact split+data+recipe -> residual = torch_em version.

slurm_profile: grete_shared

env:
  type: micromamba
  path: /mnt/vast-nhr/home/freckmann15/u12103/micromamba/envs/synapse

script: "training/cristae/train_cristae.py"
args:
  experiment_name: "cristae-net32-lr1e-4-bs8-ps32x256x256-repro0601-exactsplit-2026-06-18"
  loss_variant: "persample"
  augmentations: true
  split_file: "/mnt/vast-nhr/home/freckmann15/u12103/synapse/configs/training/cristae/splits/cristae_0601_exact_split.json"
  patch_shape: [32, 256, 256]
  n_iterations: 75000
  batch_size: 8
  learning_rate: 1.0e-4
  feature_size: 32
  ignore_state_value: 2
  state_channel: 1
  early_stopping: 30
  seed: 42
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
