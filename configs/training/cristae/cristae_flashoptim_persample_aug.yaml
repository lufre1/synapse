# Cristae training — proven best recipe (persample masked Dice + Kornia aug, legacy split, ALL files)
# run through FlashOptim (FlashAdamW + bf16) on an 80 GB A100.
# Built from cristae_allfiles_persample_aug.yaml (AP 0.830); deltas: use_flashoptim,
#   batch_size 8->12, learning_rate 1e-4->1.2e-4 (sqrt(1.5)-scaled), grete_shared_80gb profile.
# Batch size: the 2026-06-26 memory probe (cristae_probe_maxbatch.yaml) showed flashoptim runs fp32
# ("single precision") and caps at bs16 (74.9/85 GB, tight); bs12 (59.5 GB) is the safe point.
# NOTE: the probe also showed the STANDARD AMP trainer fits bs28 at lower memory + faster, so this
# flashoptim run is the dominated arm of the A/B vs cristae_persample_aug_bs24_80gb.yaml.
# Run: python sbatch_runner.py configs/training/cristae/cristae_flashoptim_persample_aug.yaml
# Dry-run first to confirm the submitted command:
#   python sbatch_runner.py configs/training/cristae/cristae_flashoptim_persample_aug.yaml --dry-run

slurm_profile: grete_shared_80gb

env:
  type: micromamba
  path: /mnt/vast-nhr/home/freckmann15/u12103/micromamba/envs/synapse

script: "training/cristae/train_cristae.py"
args:
  experiment_name: "cristae-net32-lr1.2e-4-bs12-ps32x256x256-flashoptim-persample-aug-allfiles-2026-06-26"
  use_flashoptim: true              # <-- FlashAdamW + bf16
  batch_size: 12                    # <-- safe point for flashoptim's fp32 footprint (59.5/85 GB; probe)
  learning_rate: 1.2e-4             # <-- sqrt(1.5)-scaled for the 1.5x batch
  loss_variant: "persample"         # MaskedDiceLossPerSample (proven recipe)
  augmentations: true               # default Kornia aug via AugmentedMitoStateMaskTransform
  split_strategy: "legacy"
  data_dir: "/scratch-grete/projects/nim00007/data/mitochondria/cooper/raw_mito_combined_s2"
  data_dir2: "/mnt/lustre-grete/usr/u12103/mitochondria/cooper/cristae"
  data_dir3: "/mnt/lustre-grete/usr/u12103/cristae_data/wichmann/"
  data_dir4: "/mnt/lustre-grete/usr/u12103/cristae_data/wichmann_needs_corrections/"
  patch_shape: [32, 256, 256]
  n_iterations: 100000
  feature_size: 32
  ignore_state_value: 2
  state_channel: 1
  test_split: "synapsenetv1-testsplit"
  early_stopping: 25
  seed: 42
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
