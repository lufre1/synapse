  second_data_dir: "/mnt/lustre-grete/projects/nim00020/data/volume-em/moebius/cutout_1_hdf5"
  third_data_dir: "/mnt/lustre-grete/projects/nim00020/data/volume-em/moebius/cutout_2_hdf5"
  early_stopping: 10
  raw_key: "0"
  label_key: "labels/mitochondria"
