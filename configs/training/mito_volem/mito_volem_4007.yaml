# Mito training with generic trainer — replaces run_train_mito_volem_hdf5.sh

slurm_profile: grete_shared_80gb

env:
  type: micromamba
  path: /mnt/vast-nhr/home/freckmann15/u12103/micromamba/envs/synapse

script: "training/mito-volem/train_mito_generic.py"
args:
  experiment_name: "volume-em-mito-net32-lr1e-4-bs4-ps32x512x512-withWT"
  n_iterations: 15000
  patch_shape: [32, 512, 512]
  batch_size: 4
  learning_rate: 1.0e-4
  data_dir: "/mnt/lustre-grete/usr/u12103/mitochondria/moebius/4007/train_split/"
  second_data_dir: "/mnt/lustre-grete/usr/u12103/mitochondria/moebius/4009/"
  early_stopping: 20
  raw_key: "raw"
  label_key: "labels/mitochondria"
  use_synapse_training: true
