# mamba env create --file=env.yaml
name: synapse
channels:
    - conda-forge
dependencies:
    - python=3.11
    - numpy<2
    # - bioimageio.core
    # - imagecodecs
    # - kornia
    # - magicgui
    - nifty=1.2.1=*_4
    - napari
    - pip
    - pooch
    - pyqt
    # - python-xxhash
    - python-elf <0.9  # 0.9+ requires numpy>=2, which breaks vigra/nifty (built for numpy<2)
    - pytorch-gpu
    # - segment-anything
    - torch_em >=0.7.0
    - tqdm
    # - trimesh
    - zarr < 3
    - ome-zarr
    - xxhash
    - pip:
        - flashoptim
        - git+https://github.com/ChaoningZhang/MobileSAM.git
        - napari-skimage-regionprops
        # - PyQt5==5.15.11
